name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Functions ───────────────────────────────────────────────────────────
      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions (TypeScript → JS)
        run: npm run build
        working-directory: functions

      # ── Deploy ──────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --non-interactive --project rmsv3-becf7
